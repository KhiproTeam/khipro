title: "আপনার ডিভাইসে ক্ষিপ্র"
sub_heading: >-
  আনুষ্ঠানিকভাবে ক্ষিপ্র-কে লিনাক্সের পাশাপাশি অ্যান্ড্রয়েড ও উইন্ডোজেও ব্যবহার করা যাচ্ছে।

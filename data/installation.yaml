        icon: "fas fa-magic"
        description: "লিনাক্সে টাইপিং বুস্টারের মাধ্যমে ক্ষিপ্র ব্যবহার করতে আমরা বিশেষভাবে তাগিদ করি"
        link_text: "বিস্তারিত দেখুন"
        link_url: "installation/typing-booster-configuration/"
  - name: "windows"

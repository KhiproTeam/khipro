        icon: "fas fa-keyboard"
        description: "Codepotro-র জনপ্রিয় কিবোর্ড, Borno Keyboard-এ ক্ষিপ্র লেআউট বিল্ট-ইন থাকছে"
        link_text: "ইনস্টল করুন"
        link_url: "installation/windows/#brn-kbrdr-mdhjm"
      - title: "ক্ষিপ্র উইন্ডোজ পোর্টেবল"
        icon: "fab fa-windows"
        description: "ইনস্টলেশন ছাড়াই, কেবল ক্ষিপ্র লেআউটে বাংলা টাইপ করার জন্য একটি লাইটওয়েট পোর্টেবল উইন্ডোজ IME অ্যাপ্লিকেশন।"

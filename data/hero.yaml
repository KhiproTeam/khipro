main_heading: "বাংলা টাইপিংয়ে সেরা অভিজ্ঞতার জন্য একটি উদ্যোগ"
description_paragraphs:
  - "বাংলা টাইপিংয়ের ঝামেলাগুলো - বারবার শিফট চাপা, বড়ো ও ছোটো হাতের মিশ্র ম্যাপিং মনে রাখা, নম্বর সারিতে আঙুল নিয়ে গিয়ে চন্দ্রবিন্দু ইত্যাদি লেখা, নিম্নবিন্দু (নুকতা), দ্বিদণ্ড (ডবল দাঁড়ি) ইত্যাদি দেওয়ার উপায় না থাকা আরো কত কী!"
  - "এ সব দূর করতে ক্ষিপ্রটিম নিয়ে এসেছে 'ক্ষিপ্র' কনসেপ্ট যা লোয়ারকেস ইনপুটভিত্তিক একটি বাংলা কিবো‍র্ড লেআউট।"
  - "ইংরেজির থেকেও দ্রুতগতিতে বাংলা লেখার লক্ষ্য নিয়ে ক্ষিপ্র কিবোর্ড লেআউট এখন লিনাক্স, অ্যান্ড্রয়েড, এবং উইন্ডোজের জগতে প্রবেশ করেছে।"

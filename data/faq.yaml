title: "প্রায়শই জিজ্ঞাসিত প্রশ্ন"
sub_heading: "ক্ষিপ্র কিবোর্ড সম্পর্কে সাধারণ প্রশ্ন ও উত্তর"
faqs:
  - question: "ক্ষিপ্র কিবোর্ড কী?"
    answer: "ক্ষিপ্র হলো একটি বাংলা কম্পোজিশনাল কিবোর্ড লেআউট যা ব্যবহারকারীদের শিফট কি (Shift Key) ছাড়াই দ্রুত বাংলা টাইপ করতে সাহায্য করে; এবং মডিফায়ার, স্লাইসার, পৃথায়কের মতো বিশেষ বিশেষ স্মার্ট ম্যাপ ব্যবহার করে।"
  - question: "ক্ষিপ্র কোন কোন প্ল্যাটফর্মে পাওয়া যায়?"
    answer: "ক্ষিপ্র বর্তমানে লিনাক্স (IBus/Fcitx5), উইন্ডোজ (বর্ণ কিবোর্ড, ক্ষিপ্র পোর্টেবল) এবং অ্যান্ড্রয়েডে (হেলিবোর্ড, বর্ণ কিবোর্ড) ব্যবহার করা যায়।"
  - question: "অভ্র-র সাথে ক্ষিপ্র-র পার্থক্য কী?"
    answer: "অভ্রতে সাজেশনের ওপর নির্ভর করতে হয়, অপ্রচলিত কিংবা ব্যতিক্রম বানান লিখতে অসুবিধা হয়,অভ্রতে অনেক অক্ষর লেখার জন্য শিফট চাপতে হয়, কিন্তু ক্ষিপ্রতে সবকিছু শিফট ছাড়াই সহজেই টাইপ করা যায়। অভ্রতে কিছু key দূরে, কিন্তু ক্ষিপ্র-তে অনেক কঠিন জিনিসও আরামে লেখা যায়। অভ্রতে স্লাইসারের মতো কিছু নেই, কিংবা শব্দের মাঝে কারচিহ্ন বসানো, কিংবা যুক্ত/বিযুক্ত হসন্ত দেওয়া এধরনের বিষয় নেই, যেগুলো ক্ষিপ্র-তে আছে।"
  - question: "ক্ষিপ্র শিখতে কতদিন লাগে?"
    answer: "যদি আপনি আগে থেকেই ফোনেটিক টাইপিং জেনে থাকেন, তবে ক্ষিপ্র শিখতে ১ দিনও লাগার কথা নয়। ফিক্সড লেআউট ব্যবহারকারী হলে অভ্যস্ত হতে ২-৩ দিন সময় লাগতে পারে।"
  - question: "টাইপিং বুস্টার কী?"
    answer: "টাইপিং বুস্টার হলো একটি লিনাক্স ইউটিলিটি যা ক্ষিপ্র লেআউটের সাথে কনফিগার করলে পরবর্তী শব্দের প্রেডিকশন এবং স্মার্ট সাজেশন প্রদানের মাধ্যমে টাইপিং গতি আরও বাড়িয়ে দেয়।"
  - question: "ক্ষিপ্র কি ওপেন সোর্স?"
    answer: "হ্যাঁ! ক্ষিপ্র সম্পূর্ণ ওপেন সোর্স। আপনি GitHub-এর 'ক্ষিপ্র টিম' অর্গানাইজেশনে গিয়ে সোর্স কোড দেখতে এবং অবদান রাখতে পারবেন। পেজের [সোর্স কোড](https://khipro.khiproteam.com/#repositories) বাটনে ক্লিক করুন।"
  - question: "সাপোর্ট কোথায় পাবো?"
    answer: "আমাদের ফেসবুক পেজ ও গ্রুপ, টেলিগ্রাম গ্রুপ, ও গিটহাব ফোরামে আপনি আমাদের সাথে যোগাযোগ করতে, সাপোর্ট নিতে, মতামত দিতে, কিংবা অবদান রাখতে পারেন। সাইটের [কমিউনিটি](https://khipro.khiproteam.com/#community) বাটনে ক্লিক করুন।"
  - question: "ক্ষিপ্রতে অবদান রাখতে চাই!"
    answer: "আমরা সবাইকে অবদান রাখতে উৎসাহিত করি! আমাদের [গিটহাব ফোরামে](https://github.com/KhiproTeam/khipro/discussions) পোস্ট করুন, আমাদের [GitHub রিপোজিটরিতে](https://khipro.khiproteam.com/#repositories) ইশু তৈরি করুন, বাগ রিপোর্ট, ও ফিচার রিকোয়েস্ট করুন।"
